<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Web Demo</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: Segoe UI, sans-serif; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e3a8a, #0ea5e9); color: #fff; text-align: center;
    }
    h1 { font-size: 6vw; margin: 0 0 2vh; }
    #clock { font-size: 8vw; font-variant-numeric: tabular-nums; font-weight: 700; }
    button {
      margin-top: 3vh; font-size: 3vw; padding: 1vh 3vw; border: 0; border-radius: 999px;
      background: #fff; color: #1e3a8a; cursor: pointer;
    }
    #count { font-size: 4vw; margin-top: 1vh; }
  </style>
</head>
<body>
  <h1>🌐 Live im Präsentationsmodus</h1>
  <div id="clock">--:--:--</div>
  <button onclick="bump()">Klick mich</button>
  <div id="count">Klicks: 0</div>
  <script>
    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }
    setInterval(tick, 1000); tick();
    let n = 0;
    function bump() { n++; document.getElementById('count').textContent = 'Klicks: ' + n; }
  </script>
</body>
</html>
